name: Deploy to GitHub Pages

# Generiert legal-config.js aus GitHub-Variables und veröffentlicht die Seite.
#
# Variablen anlegen unter:
#   Repo → Settings → Secrets and variables → Actions → Variables (Tab "Variables")
# Empfohlene Variablen (Namen wie in .env.example, ohne Quotes):
#   LEGAL_NAME, LEGAL_STREET, LEGAL_ZIP, LEGAL_CITY, LEGAL_EMAIL,
#   LEGAL_PHONE, LEGAL_HOSTING (= "github" oder "both"), LEGAL_GOOGLE_FONTS, LEGAL_CDNJS …
# Die E-Mail kann alternativ als *Secret* hinterlegt werden (siehe env-Block unten).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate legal-config.js
        env:
          LEGAL_NAME:          ${{ vars.LEGAL_NAME }}
          LEGAL_STREET:        ${{ vars.LEGAL_STREET }}
          LEGAL_ZIP:           ${{ vars.LEGAL_ZIP }}
          LEGAL_CITY:          ${{ vars.LEGAL_CITY }}
          LEGAL_COUNTRY:       ${{ vars.LEGAL_COUNTRY }}
          LEGAL_EMAIL:         ${{ vars.LEGAL_EMAIL || secrets.LEGAL_EMAIL }}
          LEGAL_PHONE:         ${{ vars.LEGAL_PHONE }}
          LEGAL_RESPONSIBLE:   ${{ vars.LEGAL_RESPONSIBLE }}
          LEGAL_USTID:         ${{ vars.LEGAL_USTID }}
          LEGAL_HOSTING:       ${{ vars.LEGAL_HOSTING }}
          LEGAL_GOOGLE_FONTS:  ${{ vars.LEGAL_GOOGLE_FONTS }}
          LEGAL_CDNJS:         ${{ vars.LEGAL_CDNJS }}
          LEGAL_GITHUB_LINKS:  ${{ vars.LEGAL_GITHUB_LINKS }}
          LEGAL_AUTHORITY:     ${{ vars.LEGAL_AUTHORITY }}
          LEGAL_AUTHORITY_URL: ${{ vars.LEGAL_AUTHORITY_URL }}
        run: node scripts/gen-legal-config.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
