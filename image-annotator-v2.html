<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bild-Annotator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#1c1b1a;--panel:#242322;--panel2:#2e2c2a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0ede8;--text2:#9b9890;
  --accent:#e8845a;--accent2:#c4623a;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Helvetica,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* TOP BAR */
#topbar{display:flex;align-items:center;gap:5px;padding:7px 10px;background:var(--panel);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.tb-group{display:flex;align-items:center;gap:4px;}
.tb-sep{width:0.5px;height:22px;background:var(--border2);margin:0 3px;}
.tb-label{font-size:11px;color:var(--text2);margin-right:2px;white-space:nowrap;}
.btn{padding:5px 10px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap;}
.btn:hover{background:#3a3835;border-color:rgba(255,255,255,0.25);}
.btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.btn.primary{background:var(--accent);color:white;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent2);}
.btn.ghost{background:transparent;border-color:var(--border);}
.btn.ghost:hover{background:var(--panel2);}
.btn.danger{border-color:rgba(220,80,80,0.4);color:#e05555;}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0;}
.swatch.active{border-color:white;}
.swatch:hover{border-color:rgba(255,255,255,0.5);}
select{padding:4px 8px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--panel2);color:var(--text);cursor:pointer;outline:none;}
input[type=color]{width:28px;height:22px;border:0.5px solid var(--border2);border-radius:4px;cursor:pointer;background:none;padding:0;}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;}

/* SIDE PANELS */
.side-panel{width:196px;flex-shrink:0;background:var(--panel);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.side-panel.right{border-right:none;border-left:0.5px solid var(--border);}
.sp-head{padding:10px 12px 6px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;}
.sp-body{flex:1;overflow-y:auto;padding:0 8px 10px;}

/* PAGE TABS */
#page-tabs{display:flex;flex-wrap:wrap;gap:5px;padding:8px 8px 4px;}
.page-tab{display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--panel2);border-radius:var(--r);border:0.5px solid var(--border);cursor:pointer;font-size:12px;transition:border-color .15s;}
.page-tab:hover{border-color:var(--border2);}
.page-tab.active{border-color:var(--accent);}
.page-tab-thumb{width:28px;height:20px;background:#3a3835;border-radius:3px;overflow:hidden;flex-shrink:0;}
.page-tab-thumb img{width:100%;height:100%;object-fit:cover;}
.page-tab-name{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.page-tab-del{background:none;border:none;cursor:pointer;color:var(--text2);font-size:12px;padding:1px 3px;border-radius:3px;}
.page-tab-del:hover{color:#e05555;}
#add-page-btn{display:flex;align-items:center;gap:6px;padding:6px 8px;color:var(--text2);font-size:12px;cursor:pointer;border-radius:var(--r);transition:background .15s;margin:2px 8px 8px;}
#add-page-btn:hover{background:var(--panel2);color:var(--text);}

/* ANN LIST */
.ann-item{display:flex;align-items:center;gap:7px;padding:7px 8px;background:var(--panel2);border-radius:var(--r);border:0.5px solid var(--border);cursor:pointer;transition:border-color .15s;margin-bottom:5px;}
.ann-item:hover{border-color:var(--border2);}
.ann-item.selected{border-color:var(--accent);}
.ann-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.2);}
.ann-item-label{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ann-item-del{background:none;border:none;cursor:pointer;color:var(--text2);font-size:12px;padding:1px 4px;border-radius:3px;}
.ann-item-del:hover{color:#e05555;}

/* CANVAS */
#canvas-area{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;background:#111110;padding:24px;}

/* SHEET */
#sheet{position:relative;background:white;box-shadow:0 6px 50px rgba(0,0,0,0.7);flex-shrink:0;}
#sheet-img{position:absolute;display:none;}
#ann-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;}

/* DROP OVERLAY */
#drop-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none;background:rgba(255,255,255,0.03);}
#drop-overlay.hidden{display:none;}
.drop-icon{font-size:52px;opacity:0.25;}
.drop-title{font-size:17px;font-weight:500;color:rgba(100,100,90,0.8);}
.drop-sub{font-size:13px;color:rgba(100,100,90,0.5);}

/* PROPS PANEL */
.prop-section{margin-bottom:14px;}
.prop-section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
.prop-colors{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.prop-input{width:100%;padding:6px 9px;font-size:13px;border:0.5px solid rgba(255,255,255,0.15);border-radius:var(--r);background:var(--panel2);color:var(--text);outline:none;margin-bottom:8px;}
.prop-input:focus{border-color:var(--accent);}
input[type=range]{width:100%;accent-color:var(--accent);}
.prop-val{font-size:11px;color:var(--text2);text-align:right;margin-bottom:10px;}

/* LABEL AUTO-TEXTBOX TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.toggle-label{font-size:12px;color:var(--text2);}
.toggle{position:relative;width:34px;height:19px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:rgba(255,255,255,0.12);border-radius:19px;transition:background .2s;}
.toggle input:checked+.toggle-track{background:var(--accent);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:13px;height:13px;background:white;border-radius:50%;transition:transform .2s;}
.toggle input:checked~.toggle-thumb{transform:translateX(15px);}

/* FLOATING TEXT EDITOR (on canvas) */
#text-editor{position:absolute;display:none;z-index:50;}
#text-editor textarea{background:rgba(255,255,255,0.95);border:2px solid var(--accent);border-radius:4px;padding:4px 6px;font-size:13px;font-family:'Helvetica Neue',Helvetica,sans-serif;font-weight:500;color:#111;outline:none;resize:none;min-width:80px;min-height:24px;line-height:1.3;}

/* LABEL POPUP */
#label-popup{position:fixed;background:var(--panel);border:0.5px solid var(--border2);border-radius:var(--rl);padding:14px;display:none;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,0.5);width:220px;}
#label-popup label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;}
#label-popup input{width:100%;padding:6px 9px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--panel2);color:var(--text);outline:none;margin-bottom:10px;}
#label-popup input:focus{border-color:var(--accent);}
.popup-row{display:flex;gap:6px;}
.popup-row .btn{flex:1;text-align:center;}

@media print{
  body{background:white!important;}
  #topbar,#main .side-panel{display:none!important;}
  #canvas-area{background:white!important;padding:0!important;display:block!important;overflow:visible!important;}
  #sheet{box-shadow:none!important;margin:0!important;}
}

/* Nav bar */
#ann-nav{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;
  background:var(--panel);
  border-bottom:0.5px solid var(--border);
  flex-shrink:0;
}
#ann-nav a.ann-home{
  display:inline-flex;align-items:center;gap:4px;
  color:var(--text2);text-decoration:none;font-size:11px;
  padding:3px 8px;border-radius:5px;
  border:0.5px solid var(--border2);background:var(--panel2);
  transition:all .15s;
}
#ann-nav a.ann-home:hover{color:var(--text);border-color:var(--accent);}
#ann-nav .ann-sep{color:rgba(255,255,255,.15);font-size:10px;margin:0 2px;}
#ann-nav .ann-crumb{color:rgba(255,255,255,.25);font-size:10px;}
#ann-nav .ann-lang{
  margin-left:auto;padding:3px 9px;
  background:var(--panel2);border:0.5px solid var(--border2);
  border-radius:5px;color:var(--text2);font-size:11px;
  cursor:pointer;transition:all .15s;font-family:inherit;
}
#ann-nav .ann-lang:hover{color:var(--text);border-color:var(--accent);}

</style>
</head>
<body>

<!-- TOP BAR -->
<div id="ann-nav">
  <a class="ann-home" href="index.html">🏠 <span id="ann-home-txt">Startseite</span></a>
  <span class="ann-sep">›</span>
  <span class="ann-crumb" id="ann-crumb-txt">Bild-Annotator</span>
  <span id="ann-save-status" style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.3);margin-left:12px;">
    <span id="ann-save-dot" style="width:6px;height:6px;border-radius:50%;background:#444;flex-shrink:0;transition:background .3s;"></span>
    <span id="ann-save-txt">—</span>
  </span>
  <button id="ann-clear-btn" onclick="annClearAutosave()" title="Autosave löschen" style="display:none;margin-left:6px;padding:2px 7px;background:rgba(220,80,80,.12);border:0.5px solid rgba(220,80,80,.3);border-radius:4px;color:rgba(220,120,120,.8);font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s;">✕</button>
  <button class="ann-lang" id="ann-lang-btn" onclick="annToggleLang()">🌐 EN</button>
</div>

<div id="topbar">
  <div class="tb-group">
    <button class="btn primary" onclick="triggerFileOpen()">+ Bild öffnen</button>
    <input type="file" id="file-in" accept="image/*" multiple style="display:none" onchange="loadImages(event)">
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">Werkzeug</span>
    <button class="btn active" id="tool-arrow" onclick="setTool('arrow')" title="Pfeil (A)">↗ Pfeil</button>
    <button class="btn" id="tool-line" onclick="setTool('line')" title="Linie (L)">— Linie</button>
    <button class="btn" id="tool-rect" onclick="setTool('rect')" title="Rechteck (R)">▭ Rect</button>
    <button class="btn" id="tool-circle" onclick="setTool('circle')" title="Ellipse (C)">◯ Kreis</button>
    <button class="btn" id="tool-text" onclick="setTool('text')" title="Text (T)">T Text</button>
    <button class="btn" id="tool-select" onclick="setTool('select')" title="Auswahl (S)">↖ Auswahl</button>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">Farbe</span>
    <div class="swatch active" id="sw-red" style="background:#e84040" onclick="setColor('#e84040')"></div>
    <div class="swatch" id="sw-orange" style="background:#e8845a" onclick="setColor('#e8845a')"></div>
    <div class="swatch" id="sw-blue" style="background:#4a8fe8" onclick="setColor('#4a8fe8')"></div>
    <div class="swatch" id="sw-green" style="background:#4cae6e" onclick="setColor('#4cae6e')"></div>
    <div class="swatch" id="sw-black" style="background:#1a1a18" onclick="setColor('#1a1a18')"></div>
    <div class="swatch" id="sw-white" style="background:#fff;border-color:rgba(0,0,0,0.25)" onclick="setColor('#ffffff')"></div>
    <input type="color" id="custom-color" value="#e84040" onchange="setColor(this.value)">
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">Stärke</span>
    <select id="stroke-size" onchange="strokeW=parseInt(this.value)">
      <option value="1">1px</option>
      <option value="2" selected>2px</option>
      <option value="3">3px</option>
      <option value="5">5px</option>
      <option value="8">8px</option>
    </select>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group">
    <span class="tb-label">Rand</span>
    <select id="margin-sel" onchange="setMargin(+this.value)">
      <option value="0">Kein</option>
      <option value="15">15mm</option>
      <option value="20" selected>20mm</option>
      <option value="30">30mm</option>
      <option value="40">40mm</option>
    </select>
  </div>
  <div class="tb-sep"></div>

  <!-- Auto-label toggle -->
  <div class="tb-group">
    <span class="tb-label">Auto-Text</span>
    <label class="toggle" title="Textfeld automatisch beim Pfeil erstellen">
      <input type="checkbox" id="auto-label-toggle" checked>
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>
  <div class="tb-sep"></div>

  <div class="tb-group" style="margin-left:auto;">
    <button class="btn ghost" onclick="clearPageAnns()">Anns löschen</button>
    <button class="btn" onclick="exportAllPDF()">PDF (alle)</button>
    <button class="btn" onclick="exportCurrentPDF()">PDF (aktuell)</button>
    <button class="btn primary" onclick="window.print()">Drucken</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: Pages + Annotations -->
  <div class="side-panel">
    <div class="sp-head">Seiten</div>
    <div id="page-tabs"></div>
    <div id="add-page-btn" onclick="triggerFileOpen()">
      <span style="font-size:16px;line-height:1">+</span> Bild hinzufügen
    </div>
    <div class="sp-head" style="border-top:0.5px solid var(--border);padding-top:10px;">Annotierungen</div>
    <div class="sp-body"><div id="ann-list"></div></div>
  </div>

  <!-- CENTER -->
  <div id="canvas-area" ondragover="event.preventDefault()" ondrop="onFileDrop(event)">
    <div id="sheet">
      <img id="sheet-img" src="" alt="" draggable="false">
      <svg id="ann-svg"
        onmousedown="svgDown(event)"
        onmousemove="svgMove(event)"
        onmouseup="svgUp(event)">
        <defs>
          <marker id="mh-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e84040"/></marker>
          <marker id="mh-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e8845a"/></marker>
          <marker id="mh-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a8fe8"/></marker>
          <marker id="mh-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4cae6e"/></marker>
          <marker id="mh-black" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a18"/></marker>
          <marker id="mh-white" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ffffff"/></marker>
          <marker id="mh-custom" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon id="mh-custom-poly" points="0 0,8 3,0 6" fill="#e84040"/></marker>
        </defs>
      </svg>
      <div id="drop-overlay">
        <div class="drop-icon">🖼</div>
        <div class="drop-title">Bild hier ablegen</div>
        <div class="drop-sub">oder oben auf „Bild öffnen" klicken</div>
      </div>
      <div id="text-editor"><textarea id="text-ta" rows="1" onblur="commitTextEdit()" onkeydown="taKeydown(event)"></textarea></div>
    </div>
  </div>

  <!-- RIGHT: Properties -->
  <div class="side-panel right">
    <div class="sp-head">Eigenschaften</div>
    <div class="sp-body">
      <div id="props-empty" style="font-size:12px;color:var(--text2);padding:4px 0;">Element auswählen</div>
      <div id="props-panel" style="display:none">
        <div class="prop-section">
          <div class="prop-section-title">Beschriftung</div>
          <input type="text" class="prop-input" id="prop-label" placeholder="z. B. Ein/Aus-Knopf" oninput="updateSelLabel(this.value)">
        </div>
        <div class="prop-section">
          <div class="prop-section-title">Farbe</div>
          <div class="prop-colors">
            <div class="swatch" style="background:#e84040" onclick="updateSelColor('#e84040')"></div>
            <div class="swatch" style="background:#e8845a" onclick="updateSelColor('#e8845a')"></div>
            <div class="swatch" style="background:#4a8fe8" onclick="updateSelColor('#4a8fe8')"></div>
            <div class="swatch" style="background:#4cae6e" onclick="updateSelColor('#4cae6e')"></div>
            <div class="swatch" style="background:#1a1a18" onclick="updateSelColor('#1a1a18')"></div>
            <div class="swatch" style="background:#fff;border-color:rgba(0,0,0,0.25)" onclick="updateSelColor('#ffffff')"></div>
            <input type="color" id="prop-color-pick" onchange="updateSelColor(this.value)">
          </div>
        </div>
        <div class="prop-section">
          <div class="prop-section-title">Strichstärke</div>
          <input type="range" min="1" max="12" value="2" id="prop-sw" oninput="updateSelStroke(this.value)">
          <div class="prop-val" id="prop-sw-val">2px</div>
        </div>
        <div class="prop-section">
          <div class="prop-section-title">Aktionen</div>
          <div style="display:flex;flex-direction:column;gap:5px;">
            <button class="btn" onclick="duplicateSel()">Duplizieren</button>
            <button class="btn danger" onclick="deleteSel()">Löschen</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- LABEL POPUP (auto-text on arrow finish) -->
<div id="label-popup">
  <label>Beschriftung für Pfeil</label>
  <input type="text" id="lp-input" placeholder="z. B. Ein/Aus-Knopf" maxlength="80">
  <div class="popup-row">
    <button class="btn primary" onclick="confirmLabelPopup()">OK</button>
    <button class="btn ghost" onclick="closeLabelPopup()">Überspringen</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════
const A4W = 210, A4H = 297; // mm
let pages = [];       // [{id, src, nw, nh, annotations:[]}]
let currentPageId = null;
let sheetW = 0, sheetH = 0;
let idCounter = 1;

// UI state
let tool = 'arrow';
let color = '#e84040';
let strokeW = 2;
let marginMm = 20;
let selectedId = null;

// Draw state
let drawing = false, drawStart = null, drawPreview = null;
let dragging = false, dragPrev = null;

// Label popup state
let pendingLabelAnn = null;
let pendingLabelEvent = null;

// Text edit state
let editingTextId = null;

const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('ann-svg');
const sheet = document.getElementById('sheet');
const imgEl = document.getElementById('sheet-img');

function curPage() { return pages.find(p => p.id === currentPageId) || null; }
function curAnns() { const p = curPage(); return p ? p.annotations : []; }

// ═══════════════════════════════════════════════════════
// FILE OPEN
// ═══════════════════════════════════════════════════════
function triggerFileOpen() { document.getElementById('file-in').click(); }

function loadImages(e) {
  const files = Array.from(e.target.files);
  files.forEach(f => { if (f.type.startsWith('image/')) addImagePage(f); });
  e.target.value = '';
}
function onFileDrop(e) {
  e.preventDefault();
  Array.from(e.dataTransfer.files).forEach(f => { if (f.type.startsWith('image/')) addImagePage(f); });
}

function addImagePage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const page = { id: idCounter++, src: ev.target.result, nw: img.naturalWidth, nh: img.naturalHeight, annotations: [], name: file.name.replace(/\.[^.]+$/,'') };
      pages.push(page);
      if (!currentPageId) currentPageId = page.id;
      renderPageTabs();
      if (currentPageId === page.id) switchPage(page.id);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════════════════
// PAGE MANAGEMENT
// ═══════════════════════════════════════════════════════
function switchPage(id) {
  currentPageId = id;
  selectedId = null;
  const p = curPage();
  if (!p) return;

  // Show image
  imgEl.src = p.src;
  imgEl.onload = () => {
    positionImage(p);
    renderAll();
    updateAnnList();
    updatePropsPanel();
  };
  if (imgEl.complete && imgEl.naturalWidth > 0) {
    positionImage(p);
    renderAll();
    updateAnnList();
    updatePropsPanel();
  }
  document.getElementById('drop-overlay').classList.add('hidden');
  renderPageTabs();
}

function removePage(id) {
  if (pages.length === 1) { alert('Mindestens eine Seite muss vorhanden sein.'); return; }
  pages = pages.filter(p => p.id !== id);
  if (currentPageId === id) {
    currentPageId = pages[0].id;
    switchPage(currentPageId);
  }
  renderPageTabs();
}

function renderPageTabs() {
  const container = document.getElementById('page-tabs');
  container.innerHTML = '';
  pages.forEach(p => {
    const d = document.createElement('div');
    d.className = 'page-tab' + (p.id === currentPageId ? ' active' : '');
    d.style.width = '100%';
    d.innerHTML = `
      <div class="page-tab-thumb"><img src="${p.src}" alt=""></div>
      <span class="page-tab-name">${p.name}</span>
      <button class="page-tab-del" onclick="event.stopPropagation();removePage(${p.id})">✕</button>
    `;
    d.addEventListener('click', () => switchPage(p.id));
    container.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════════
// SHEET & IMAGE LAYOUT
// ═══════════════════════════════════════════════════════
function initSheet() {
  const area = document.getElementById('canvas-area');
  const aH = area.clientHeight - 48, aW = area.clientWidth - 48;
  const ratio = A4H / A4W;
  if (aW * ratio <= aH) { sheetW = aW; sheetH = aW * ratio; }
  else { sheetH = aH; sheetW = aH / ratio; }
  sheet.style.width = sheetW + 'px';
  sheet.style.height = sheetH + 'px';
  svg.setAttribute('viewBox', `0 0 ${sheetW} ${sheetH}`);
  const p = curPage();
  if (p) positionImage(p);
}

function positionImage(p) {
  // Smart margin: portrait image → extra space left/right; landscape → top/bottom
  const imgRatio = p.nw / p.nh;
  const isPortrait = p.nh > p.nw;

  const mPx = marginMm / A4W * sheetW;  // base margin in sheet-px

  let maxW, maxH, offX, offY;
  if (isPortrait) {
    // Hochformat: fixed top/bottom small margin, bigger left/right (from marginMm)
    const topBotPx = Math.max(mPx * 0.5, 10);
    maxW = sheetW - mPx * 2;
    maxH = sheetH - topBotPx * 2;
  } else {
    // Querformat: bigger top/bottom margin, smaller left/right
    const sidePx = Math.max(mPx * 0.5, 10);
    maxW = sheetW - sidePx * 2;
    maxH = sheetH - mPx * 2;
  }

  const scale = Math.min(maxW / p.nw, maxH / p.nh);
  const iw = p.nw * scale, ih = p.nh * scale;
  offX = (sheetW - iw) / 2;
  offY = (sheetH - ih) / 2;

  imgEl.style.left = offX + 'px';
  imgEl.style.top  = offY + 'px';
  imgEl.style.width = iw + 'px';
  imgEl.style.height = ih + 'px';
  imgEl.style.display = 'block';
  p._imgX = offX; p._imgY = offY; p._imgW = iw; p._imgH = ih;
}

function setMargin(v) {
  marginMm = v;
  const p = curPage();
  if (p) { positionImage(p); renderAll(); }
}

window.addEventListener('resize', () => { initSheet(); });
initSheet();

// ═══════════════════════════════════════════════════════
// TOOLS
// ═══════════════════════════════════════════════════════
function setTool(t) {
  tool = t;
  document.querySelectorAll('[id^=tool-]').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-'+t)?.classList.add('active');
  svg.style.cursor = t === 'select' ? 'default' : 'crosshair';
  if (t !== 'select') { selectedId = null; updatePropsPanel(); renderAll(); }
}

function setColor(c) {
  color = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  const map = {'#e84040':'sw-red','#e8845a':'sw-orange','#4a8fe8':'sw-blue','#4cae6e':'sw-green','#1a1a18':'sw-black','#ffffff':'sw-white'};
  if (map[c]) document.getElementById(map[c])?.classList.add('active');
  document.getElementById('custom-color').value = c;
}

// ═══════════════════════════════════════════════════════
// SVG COORDINATES
// ═══════════════════════════════════════════════════════
function svgPt(e) {
  const r = svg.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// ═══════════════════════════════════════════════════════
// MOUSE EVENTS
// ═══════════════════════════════════════════════════════
function svgDown(e) {
  if (e.button !== 0) return;
  const pt = svgPt(e);

  // Close any open label popup if clicking elsewhere
  if (document.getElementById('label-popup').style.display === 'block') {
    closeLabelPopup(); return;
  }

  if (tool === 'select') {
    const hit = hitTest(pt);
    if (hit) {
      selectedId = hit.id; dragging = true; dragPrev = pt;
      updatePropsPanel(); renderAll(); updateAnnList();
    } else {
      selectedId = null; updatePropsPanel(); renderAll();
    }
    return;
  }

  if (!curPage()) return;

  if (tool === 'text') {
    drawing = false;
    addTextAnn(pt);
    return;
  }

  drawing = true; drawStart = pt;
  drawPreview = mkPreview(tool, pt, pt);
  if (drawPreview) svg.appendChild(drawPreview);
}

function svgMove(e) {
  const pt = svgPt(e);
  if (dragging && selectedId !== null) {
    const ann = curAnns().find(a => a.id === selectedId); if (!ann) return;
    const dx = pt.x - dragPrev.x, dy = pt.y - dragPrev.y;
    dragPrev = pt;
    ann.x1+=dx; ann.y1+=dy; ann.x2+=dx; ann.y2+=dy;
    if (ann.tx !== undefined) { ann.tx+=dx; ann.ty+=dy; }
    renderAll(); return;
  }
  if (!drawing || !drawStart) return;
  if (drawPreview) drawPreview.remove();
  drawPreview = mkPreview(tool, drawStart, pt);
  if (drawPreview) svg.appendChild(drawPreview);
}

function svgUp(e) {
  const pt = svgPt(e);
  dragging = false;
  if (!drawing || !drawStart) return;
  drawing = false;
  if (drawPreview) { drawPreview.remove(); drawPreview = null; }

  const dx = Math.abs(pt.x - drawStart.x), dy = Math.abs(pt.y - drawStart.y);
  if (dx < 4 && dy < 4) { drawStart = null; return; }

  const ann = { id: idCounter++, type: tool, x1: drawStart.x, y1: drawStart.y, x2: pt.x, y2: pt.y, color, strokeW, label: '' };
  curPage().annotations.push(ann);
  selectedId = ann.id;
  drawStart = null;
  renderAll(); updatePropsPanel(); updateAnnList();

  // Auto-label popup for arrows
  if (tool === 'arrow' && document.getElementById('auto-label-toggle').checked) {
    openLabelPopup(ann, e);
  }
}

// ═══════════════════════════════════════════════════════
// AUTO-LABEL POPUP
// ═══════════════════════════════════════════════════════
function openLabelPopup(ann, e) {
  pendingLabelAnn = ann;
  const popup = document.getElementById('label-popup');
  const input = document.getElementById('lp-input');
  input.value = '';
  popup.style.display = 'block';
  // Position near arrow end
  const r = sheet.getBoundingClientRect();
  const ex = r.left + ann.x2 / sheetW * r.width;
  const ey = r.top + ann.y2 / sheetH * r.height;
  popup.style.left = Math.min(ex + 12, window.innerWidth - 240) + 'px';
  popup.style.top  = Math.max(ey - 30, 10) + 'px';
  setTimeout(() => input.focus(), 40);
}
function confirmLabelPopup() {
  if (!pendingLabelAnn) return;
  const val = document.getElementById('lp-input').value.trim();
  pendingLabelAnn.label = val;
  document.getElementById('prop-label').value = val;
  renderAll(); updateAnnList();
  closeLabelPopup();
}
function closeLabelPopup() {
  document.getElementById('label-popup').style.display = 'none';
  pendingLabelAnn = null;
}
document.getElementById('lp-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmLabelPopup();
  if (e.key === 'Escape') closeLabelPopup();
});

// ═══════════════════════════════════════════════════════
// TEXT ANNOTATION
// ═══════════════════════════════════════════════════════
function addTextAnn(pt) {
  const ann = { id: idCounter++, type: 'text', x1: pt.x, y1: pt.y, x2: pt.x+120, y2: pt.y+26, color, strokeW, label: '' };
  curPage().annotations.push(ann);
  selectedId = ann.id;
  renderAll(); updatePropsPanel(); updateAnnList();
  startTextEdit(ann);
}

function startTextEdit(ann) {
  editingTextId = ann.id;
  const te = document.getElementById('text-editor');
  const ta = document.getElementById('text-ta');
  // Position over sheet
  const sr = sheet.getBoundingClientRect();
  const sx = sr.left + ann.x1 / sheetW * sr.width;
  const sy = sr.top  + ann.y1 / sheetH * sr.height;
  const fs = Math.max(11, sheetW * 0.022);
  te.style.left = sx + 'px'; te.style.top = sy + 'px';
  te.style.display = 'block';
  ta.style.fontSize = fs + 'px';
  ta.value = ann.label;
  ta.style.width = '140px';
  setTimeout(() => { ta.focus(); ta.select(); }, 30);
}

function commitTextEdit() {
  if (editingTextId === null) return;
  const ann = curAnns().find(a => a.id === editingTextId);
  if (ann) { ann.label = document.getElementById('text-ta').value.trim() || 'Text'; }
  document.getElementById('text-editor').style.display = 'none';
  editingTextId = null;
  renderAll(); updateAnnList(); updatePropsPanel();
}

function taKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitTextEdit(); }
  if (e.key === 'Escape') { document.getElementById('text-editor').style.display = 'none'; editingTextId = null; }
}

// ═══════════════════════════════════════════════════════
// SVG PREVIEW ELEMENT
// ═══════════════════════════════════════════════════════
function mkPreview(type, p1, p2) {
  const mk = (tag,a) => { const el=document.createElementNS(NS,tag); for(const[k,v] of Object.entries(a)) el.setAttribute(k,v); return el; };
  if (type==='arrow') {
    const g=document.createElementNS(NS,'g');
    g.appendChild(mk('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:color,'stroke-width':strokeW,'marker-end':`url(#${markerId(color)})`,'stroke-linecap':'round','opacity':'0.6'}));
    return g;
  }
  if (type==='line') return mk('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:color,'stroke-width':strokeW,'stroke-linecap':'round','opacity':'0.6'});
  if (type==='rect') { const x=Math.min(p1.x,p2.x),y=Math.min(p1.y,p2.y),w=Math.abs(p2.x-p1.x),h=Math.abs(p2.y-p1.y); return mk('rect',{x,y,width:w,height:h,stroke:color,'stroke-width':strokeW,fill:'none',rx:2,'opacity':'0.6'}); }
  if (type==='circle') { const cx=(p1.x+p2.x)/2,cy=(p1.y+p2.y)/2,rx=Math.abs(p2.x-p1.x)/2,ry=Math.abs(p2.y-p1.y)/2; return mk('ellipse',{cx,cy,rx,ry,stroke:color,'stroke-width':strokeW,fill:'none','opacity':'0.6'}); }
  return null;
}

function markerId(col) {
  const m={'#e84040':'mh-red','#e8845a':'mh-orange','#4a8fe8':'mh-blue','#4cae6e':'mh-green','#1a1a18':'mh-black','#ffffff':'mh-white'};
  if (m[col]) return m[col];
  document.getElementById('mh-custom-poly').setAttribute('fill', col);
  return 'mh-custom';
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderAll() {
  svg.querySelectorAll('.ann-g').forEach(g => g.remove());
  const anns = curAnns();
  anns.forEach(ann => {
    const g = document.createElementNS(NS,'g');
    g.classList.add('ann-g'); g.dataset.id = ann.id;
    g.style.cursor = tool==='select' ? 'move' : 'default';

    const mk=(tag,a)=>{ const el=document.createElementNS(NS,tag); for(const[k,v] of Object.entries(a)) el.setAttribute(k,v); return el; };
    const mid = markerId(ann.color);

    // Shape
    if (ann.type==='arrow') {
      g.appendChild(mk('line',{x1:ann.x1,y1:ann.y1,x2:ann.x2,y2:ann.y2,stroke:ann.color,'stroke-width':ann.strokeW,'marker-end':`url(#${mid})`,'stroke-linecap':'round'}));
      if (ann.color !== '#e84040' && ann.color !== '#e8845a' && ann.color !== '#4a8fe8' && ann.color !== '#4cae6e' && ann.color !== '#1a1a18' && ann.color !== '#ffffff') {
        document.getElementById('mh-custom-poly').setAttribute('fill', ann.color);
      }
    } else if (ann.type==='line') {
      g.appendChild(mk('line',{x1:ann.x1,y1:ann.y1,x2:ann.x2,y2:ann.y2,stroke:ann.color,'stroke-width':ann.strokeW,'stroke-linecap':'round'}));
    } else if (ann.type==='rect') {
      const x=Math.min(ann.x1,ann.x2),y=Math.min(ann.y1,ann.y2),w=Math.abs(ann.x2-ann.x1),h=Math.abs(ann.y2-ann.y1);
      g.appendChild(mk('rect',{x,y,width:w,height:h,stroke:ann.color,'stroke-width':ann.strokeW,fill:'none',rx:2}));
    } else if (ann.type==='circle') {
      const cx=(ann.x1+ann.x2)/2,cy=(ann.y1+ann.y2)/2,rx=Math.abs(ann.x2-ann.x1)/2,ry=Math.abs(ann.y2-ann.y1)/2;
      g.appendChild(mk('ellipse',{cx,cy,rx,ry,stroke:ann.color,'stroke-width':ann.strokeW,fill:'none'}));
    } else if (ann.type==='text') {
      const fs=Math.max(11, sheetW*0.022);
      const t=mk('text',{x:ann.x1,y:ann.y1+fs,'font-family':'Helvetica Neue,Helvetica,sans-serif','font-size':fs,'font-weight':'500',fill:ann.color});
      t.textContent = ann.label || '(Text)';
      g.appendChild(t);
    }

    // Label badge (for non-text types)
    if (ann.label && ann.type !== 'text') {
      // Place label at arrow tip (x2,y2) with slight offset, or near shape center
      let lx, ly;
      if (ann.type === 'arrow') {
        // place label near the START of arrow (the non-tip end = x1,y1), in the margin area
        lx = ann.x1; ly = ann.y1;
      } else {
        lx = (ann.x1+ann.x2)/2; ly = Math.max(ann.y1,ann.y2)+18;
      }
      const fs = Math.max(10, sheetW*0.018);
      const padX=6, padH=fs*1.55, estW=ann.label.length*fs*0.58+padX*2;
      g.appendChild(mk('rect',{x:lx-estW/2,y:ly-padH+4,width:estW,height:padH,rx:3,fill:ann.color,opacity:'0.92'}));
      const lt=mk('text',{x:lx,y:ly,'font-family':'Helvetica Neue,Helvetica,sans-serif','font-size':fs,'font-weight':'500',fill:'#fff','text-anchor':'middle'});
      lt.textContent=ann.label; g.appendChild(lt);
    }

    // Selection handles
    if (ann.id===selectedId) {
      const bx=Math.min(ann.x1,ann.x2)-7,by=Math.min(ann.y1,ann.y2)-7,bw=Math.abs(ann.x2-ann.x1)+14,bh=Math.abs(ann.y2-ann.y1)+14;
      g.insertBefore(mk('rect',{x:bx,y:by,width:bw,height:bh,rx:4,fill:'none',stroke:ann.color,'stroke-width':1,'stroke-dasharray':'5 3',opacity:'0.5','pointer-events':'none'}), g.firstChild);
      [{x:ann.x1,y:ann.y1},{x:ann.x2,y:ann.y2}].forEach(h=>{
        g.appendChild(mk('circle',{cx:h.x,cy:h.y,r:5,fill:'white',stroke:ann.color,'stroke-width':1.5,'pointer-events':'none'}));
      });
    }

    g.addEventListener('mousedown', e => {
      if (tool==='select') { e.stopPropagation(); selectedId=ann.id; dragging=true; dragPrev=svgPt(e); updatePropsPanel(); renderAll(); updateAnnList(); }
    });
    g.addEventListener('dblclick', e => {
      if (tool==='select') { e.stopPropagation(); openInlineEdit(ann, e); }
    });

    svg.appendChild(g);
  });
}

function openInlineEdit(ann, e) {
  if (ann.type==='text') { startTextEdit(ann); return; }
  // open label popup
  pendingLabelAnn = ann;
  const popup = document.getElementById('label-popup');
  document.getElementById('lp-input').value = ann.label;
  popup.style.display = 'block';
  popup.style.left = Math.min(e.clientX+12, window.innerWidth-240) + 'px';
  popup.style.top  = Math.max(e.clientY-30, 10) + 'px';
  setTimeout(() => document.getElementById('lp-input').focus(), 30);
}

// ═══════════════════════════════════════════════════════
// HIT TEST
// ═══════════════════════════════════════════════════════
function hitTest(pt) {
  const anns = curAnns();
  for (let i=anns.length-1; i>=0; i--) {
    const a=anns[i];
    const mx=Math.min(a.x1,a.x2)-10, Mx=Math.max(a.x1,a.x2)+10;
    const my=Math.min(a.y1,a.y2)-10, My=Math.max(a.y1,a.y2)+10;
    if (pt.x>=mx && pt.x<=Mx && pt.y>=my && pt.y<=My) return a;
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// PROPS PANEL
// ═══════════════════════════════════════════════════════
function updatePropsPanel() {
  const ann = curAnns().find(a=>a.id===selectedId);
  if (!ann) { document.getElementById('props-empty').style.display='block'; document.getElementById('props-panel').style.display='none'; return; }
  document.getElementById('props-empty').style.display='none';
  document.getElementById('props-panel').style.display='block';
  document.getElementById('prop-label').value=ann.label;
  document.getElementById('prop-sw').value=ann.strokeW;
  document.getElementById('prop-sw-val').textContent=ann.strokeW+'px';
  document.getElementById('prop-color-pick').value=ann.color;
}
function updateSelLabel(v) { const a=curAnns().find(a=>a.id===selectedId); if(a){a.label=v; renderAll(); updateAnnList();} }
function updateSelColor(c) { const a=curAnns().find(a=>a.id===selectedId); if(a){a.color=c; document.getElementById('prop-color-pick').value=c; renderAll();} }
function updateSelStroke(v) { const a=curAnns().find(a=>a.id===selectedId); if(a){a.strokeW=+v; document.getElementById('prop-sw-val').textContent=v+'px'; renderAll();} }
function deleteSel() { const p=curPage(); if(!p) return; p.annotations=p.annotations.filter(a=>a.id!==selectedId); selectedId=null; renderAll(); updatePropsPanel(); updateAnnList(); }
function duplicateSel() { const a=curAnns().find(a=>a.id===selectedId); if(!a) return; const c={...a,id:idCounter++,x1:a.x1+20,y1:a.y1+20,x2:a.x2+20,y2:a.y2+20}; curPage().annotations.push(c); selectedId=c.id; renderAll(); updatePropsPanel(); updateAnnList(); }

// ═══════════════════════════════════════════════════════
// ANN LIST
// ═══════════════════════════════════════════════════════
function updateAnnList() {
  const list = document.getElementById('ann-list');
  list.innerHTML = '';
  const anns = curAnns();
  if (!anns.length) { list.innerHTML='<div style="font-size:12px;color:var(--text2);padding:2px 0;">Noch keine Elemente</div>'; return; }
  const typeMap = {arrow:'↗ Pfeil',line:'— Linie',rect:'▭ Rect',circle:'◯ Kreis',text:'T Text'};
  anns.forEach((ann,i) => {
    const d = document.createElement('div');
    d.className = 'ann-item'+(ann.id===selectedId?' selected':'');
    d.innerHTML = `<div class="ann-dot" style="background:${ann.color}"></div><span class="ann-item-label">${ann.label || typeMap[ann.type]+' '+(i+1)}</span><button class="ann-item-del" onclick="event.stopPropagation();removeAnn(${ann.id})">✕</button>`;
    d.addEventListener('click',()=>{ selectedId=ann.id; setTool('select'); renderAll(); updatePropsPanel(); });
    list.appendChild(d);
  });
}
function removeAnn(id) { const p=curPage(); if(!p) return; p.annotations=p.annotations.filter(a=>a.id!==id); if(selectedId===id) selectedId=null; renderAll(); updatePropsPanel(); updateAnnList(); }
function clearPageAnns() { const p=curPage(); if(!p||!p.annotations.length) return; if(!confirm('Alle Annotierungen dieser Seite löschen?')) return; p.annotations=[]; selectedId=null; renderAll(); updatePropsPanel(); updateAnnList(); }

// ═══════════════════════════════════════════════════════
// PDF EXPORT
// ═══════════════════════════════════════════════════════
async function exportCurrentPDF() {
  const p = curPage(); if (!p) { alert('Kein Bild geladen.'); return; }
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  await renderPageToPDF(pdf, p);
  pdf.save((p.name||'seite')+'.pdf');
}

async function exportAllPDF() {
  if (!pages.length) { alert('Keine Seiten vorhanden.'); return; }
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  for (let i=0; i<pages.length; i++) {
    if (i>0) pdf.addPage();
    await renderPageToPDF(pdf, pages[i]);
  }
  pdf.save('annotiert-alle.pdf');
}

async function renderPageToPDF(pdf, p) {
  pdf.setFillColor(255,255,255);
  pdf.rect(0,0,A4W,A4H,'F');

  // Determine image placement (same logic as positionImage but in mm)
  const isPortrait = p.nh > p.nw;
  let maxWmm, maxHmm;
  if (isPortrait) {
    const sideMargin = marginMm;
    const topBot = Math.max(marginMm*0.5, 5);
    maxWmm = A4W - sideMargin*2; maxHmm = A4H - topBot*2;
  } else {
    const sideMargin = Math.max(marginMm*0.5, 5);
    maxWmm = A4W - sideMargin*2; maxHmm = A4H - marginMm*2;
  }
  const scale = Math.min(maxWmm/p.nw, maxHmm/p.nh);
  const iwMm = p.nw*scale, ihMm = p.nh*scale;
  const ixMm = (A4W-iwMm)/2, iyMm = (A4H-ihMm)/2;
  pdf.addImage(p.src,'JPEG',ixMm,iyMm,iwMm,ihMm);

  // Scale sheet coords → mm
  const sx = A4W/sheetW, sy = A4H/sheetH;

  p.annotations.forEach(ann => {
    const hex=ann.color;
    const r=parseInt(hex.slice(1,3),16)||0, g=parseInt(hex.slice(3,5),16)||0, b=parseInt(hex.slice(5,7),16)||0;
    pdf.setDrawColor(r,g,b); pdf.setFillColor(r,g,b);
    pdf.setLineWidth(ann.strokeW*sx*0.7);
    const x1=ann.x1*sx,y1=ann.y1*sy,x2=ann.x2*sx,y2=ann.y2*sy;

    if (ann.type==='arrow'||ann.type==='line') {
      pdf.line(x1,y1,x2,y2);
      if (ann.type==='arrow') {
        const ang=Math.atan2(y2-y1,x2-x1), as=2.5;
        pdf.triangle(x2,y2, x2-as*Math.cos(ang-0.5),y2-as*Math.sin(ang-0.5), x2-as*Math.cos(ang+0.5),y2-as*Math.sin(ang+0.5),'F');
      }
    } else if (ann.type==='rect') {
      pdf.rect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1),'S');
    } else if (ann.type==='circle') {
      pdf.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,'S');
    } else if (ann.type==='text') {
      pdf.setFontSize(9); pdf.setTextColor(r,g,b);
      pdf.text(ann.label||'',x1,y1); pdf.setTextColor(0,0,0);
    }

    if (ann.label && ann.type!=='text') {
      let lx,ly;
      if (ann.type==='arrow') { lx=x1; ly=y1; }
      else { lx=(x1+x2)/2; ly=Math.max(y1,y2)+4; }
      pdf.setFontSize(7); pdf.setFillColor(r,g,b);
      const tw=pdf.getTextWidth(ann.label);
      pdf.roundedRect(lx-tw/2-1.5,ly-4,tw+3,5.5,0.8,0.8,'F');
      pdf.setTextColor(255,255,255);
      pdf.text(ann.label,lx,ly,{align:'center'});
      pdf.setTextColor(0,0,0);
    }
  });
}

/* ════════════════════════════════════════════════════════
   INDEXEDDB AUTOSAVE
   - DB: ann_autosave_db  Store: project  Key: 'state'
   - Saves: pages (with full src DataURLs), idCounter, marginMm, tool, color, strokeW
   - Autosave: debounced 2s after any change
   - Restore: modal on startup if saved state exists
════════════════════════════════════════════════════════ */

const ANN_IDB_NAME    = 'ann_autosave_db';
const ANN_IDB_VERSION = 1;
const ANN_IDB_STORE   = 'project';
const ANN_IDB_KEY     = 'state';

let _annIdb = null;
let _annSaveTimer = null;

/* ── Open DB ── */
function annOpenIDB() {
  if (_annIdb) return Promise.resolve(_annIdb);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(ANN_IDB_NAME, ANN_IDB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(ANN_IDB_STORE);
    };
    req.onsuccess = e => { _annIdb = e.target.result; resolve(_annIdb); };
    req.onerror   = () => reject(req.error);
  });
}

/* ── Write ── */
async function annIdbSet(data) {
  const db = await annOpenIDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(ANN_IDB_STORE, 'readwrite');
    tx.objectStore(ANN_IDB_STORE).put(data, ANN_IDB_KEY);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

/* ── Read ── */
async function annIdbGet() {
  const db = await annOpenIDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(ANN_IDB_STORE, 'readonly');
    const req = tx.objectStore(ANN_IDB_STORE).get(ANN_IDB_KEY);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror   = () => reject(req.error);
  });
}

/* ── Delete ── */
async function annIdbDelete() {
  const db = await annOpenIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(ANN_IDB_STORE, 'readwrite');
    tx.objectStore(ANN_IDB_STORE).delete(ANN_IDB_KEY);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

/* ── Status dot ── */
function annSetSaveDot(state, text) {
  const dot = document.getElementById('ann-save-dot');
  const txt = document.getElementById('ann-save-txt');
  const clr = document.getElementById('ann-clear-btn');
  const colors = { saved:'#4cae6e', saving:'#e8c55a', error:'#e84040', idle:'#444' };
  if (dot) dot.style.background = colors[state] || colors.idle;
  if (txt) txt.textContent = text || '';
  if (clr) clr.style.display = (state === 'saved') ? 'block' : 'none';
}

/* ── Serialize state ── */
function annSerialize() {
  return {
    version:   2,
    savedAt:   new Date().toISOString(),
    idCounter,
    marginMm,
    tool,
    color,
    strokeW,
    pages: pages.map(p => ({
      id:          p.id,
      name:        p.name,
      src:         p.src,   // full DataURL — images included
      nw:          p.nw,
      nh:          p.nh,
      annotations: p.annotations.map(a => ({ ...a })),
    })),
    currentPageId,
  };
}

/* ── Deserialize and restore ── */
async function annDeserialize(data) {
  pages         = [];
  idCounter     = data.idCounter  || 1;
  marginMm      = data.marginMm   || 20;
  tool          = data.tool       || 'arrow';
  color         = data.color      || '#e84040';
  strokeW       = data.strokeW    || 2;

  // Restore margin selector
  const marginSel = document.getElementById('margin-sel');
  if (marginSel) marginSel.value = String(marginMm);

  // Restore stroke selector
  const strokeSel = document.getElementById('stroke-size');
  if (strokeSel) strokeSel.value = String(strokeW);

  // Restore color swatch
  setColor(color);

  // Restore tool
  setTool(tool);

  for (const pd of (data.pages || [])) {
    await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        pages.push({
          id:          pd.id,
          name:        pd.name,
          src:         pd.src,
          nw:          pd.nw  || img.naturalWidth,
          nh:          pd.nh  || img.naturalHeight,
          annotations: (pd.annotations || []).map(a => ({ ...a })),
        });
        resolve();
      };
      img.onerror = resolve;  // skip broken images gracefully
      img.src = pd.src;
    });
  }

  currentPageId = data.currentPageId || (pages[0] ? pages[0].id : null);

  renderPageTabs();
  if (currentPageId) {
    switchPage(currentPageId);
  } else {
    updateAnnList();
  }
}

/* ── Schedule autosave ── */
function annScheduleSave() {
  clearTimeout(_annSaveTimer);
  annSetSaveDot('saving', annT('saveSaving'));
  _annSaveTimer = setTimeout(async () => {
    try {
      await annIdbSet(annSerialize());
      const ts = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      annSetSaveDot('saved', `${annT('saveSaved')} ${ts}`);
    } catch (err) {
      console.warn('Autosave error:', err);
      annSetSaveDot('error', annT('saveError'));
    }
  }, 2000);
}

/* ── Clear autosave ── */
async function annClearAutosave() {
  const msg = annT('confirmClearSave');
  if (!confirm(msg)) return;
  try {
    await annIdbDelete();
    annSetSaveDot('idle', annT('saveCleared'));
    document.getElementById('ann-clear-btn').style.display = 'none';
  } catch (err) {
    console.warn('IDB delete error:', err);
  }
}

/* ── Restore dialog ── */
let _annPendingRestore = null;

function annShowRestoreDialog(data) {
  _annPendingRestore = data;
  const savedAt  = data.savedAt ? new Date(data.savedAt).toLocaleString() : '—';
  const pageCount = (data.pages || []).length;
  const annCount  = (data.pages || []).reduce((s, p) => s + (p.annotations || []).length, 0);

  document.getElementById('restore-title').textContent = annT('restoreTitle');
  document.getElementById('restore-info').innerHTML =
    `${annT('restoreInfo')
      .replace('{pages}', pageCount)
      .replace('{anns}', annCount)}<br><span style="font-size:10px;opacity:.6;">${savedAt}</span>`;
  document.getElementById('restore-yes').textContent = annT('restoreYes');
  document.getElementById('restore-no').textContent  = annT('restoreNo');

  const overlay = document.getElementById('restore-overlay');
  overlay.style.display = 'flex';
}

async function annRestoreYes() {
  document.getElementById('restore-overlay').style.display = 'none';
  if (!_annPendingRestore) return;
  annSetSaveDot('saving', annT('restoreLoading'));
  try {
    await annDeserialize(_annPendingRestore);
    const ts = new Date(_annPendingRestore.savedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    annSetSaveDot('saved', `${annT('saveRestored')} ${ts}`);
    document.getElementById('ann-clear-btn').style.display = 'block';
  } catch (err) {
    console.warn('Restore error:', err);
    annSetSaveDot('error', annT('saveError'));
  }
  _annPendingRestore = null;
}

function annRestoreNo() {
  document.getElementById('restore-overlay').style.display = 'none';
  _annPendingRestore = null;
  // Optionally wipe the old save so it doesn't prompt again
  annIdbDelete().catch(() => {});
  annSetSaveDot('idle', '—');
}

/* ── Hook all mutating functions to trigger autosave ── */
function annHookMutations() {
  // Patch svgUp to save after each draw
  const _origSvgUp = svgUp;
  window.svgUp = function(e) {
    _origSvgUp(e);
    annScheduleSave();
  };

  // Patch svgMove (for drag end) — save on mouseup is already covered,
  // but also hook dragging end:
  const _origSvgMove = svgMove;
  window.svgMove = function(e) {
    _origSvgMove(e);
    // Only schedule save when actively dragging (not just hovering)
    if (dragging) annScheduleSave();
  };

  // Patch commitTextEdit
  const _origCommit = commitTextEdit;
  window.commitTextEdit = function() {
    _origCommit();
    annScheduleSave();
  };

  // Patch updateSelLabel (typing in prop panel)
  const _origUpdateSelLabel = updateSelLabel;
  window.updateSelLabel = function(v) {
    _origUpdateSelLabel(v);
    annScheduleSave();
  };

  // Patch updateSelColor
  const _origUpdateSelColor = updateSelColor;
  window.updateSelColor = function(c) {
    _origUpdateSelColor(c);
    annScheduleSave();
  };

  // Patch updateSelStroke
  const _origUpdateSelStroke = updateSelStroke;
  window.updateSelStroke = function(v) {
    _origUpdateSelStroke(v);
    annScheduleSave();
  };

  // Patch deleteSel
  const _origDeleteSel = deleteSel;
  window.deleteSel = function() {
    _origDeleteSel();
    annScheduleSave();
  };

  // Patch duplicateSel
  const _origDuplicateSel = duplicateSel;
  window.duplicateSel = function() {
    _origDuplicateSel();
    annScheduleSave();
  };

  // Patch removeAnn
  const _origRemoveAnn = removeAnn;
  window.removeAnn = function(id) {
    _origRemoveAnn(id);
    annScheduleSave();
  };

  // Patch removePage
  const _existingRemovePage = window.removePage;
  window.removePage = function(id) {
    _existingRemovePage(id);
    annScheduleSave();
  };

  // Patch addImagePage to save after image is loaded
  const _origAddImagePage = addImagePage;
  window.addImagePage = function(file) {
    _origAddImagePage(file);
    // Save after a short delay to let the image load finish
    setTimeout(annScheduleSave, 500);
  };

  // Patch setMargin
  const _origSetMargin = setMargin;
  window.setMargin = function(v) {
    _origSetMargin(v);
    annScheduleSave();
  };

  // Patch clearPageAnns (already patched for i18n — re-patch to also save)
  const _existingClearPageAnns = window.clearPageAnns;
  window.clearPageAnns = function() {
    _existingClearPageAnns();
    annScheduleSave();
  };
}

/* ── Startup: check for saved state ── */
async function annInitAutosave() {
  annHookMutations();
  try {
    const saved = await annIdbGet();
    if (saved && saved.pages && saved.pages.length > 0) {
      annShowRestoreDialog(saved);
    } else {
      annSetSaveDot('idle', '—');
    }
  } catch (err) {
    console.warn('IDB init error:', err);
    annSetSaveDot('idle', '—');
  }
}

annInitAutosave();

      <button id="restore-no" onclick="annRestoreNo()" style="flex:1;padding:8px;background:var(--panel2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;">Neu beginnen</button>
    </div>
  </div>
</div>

</body>
</html>
